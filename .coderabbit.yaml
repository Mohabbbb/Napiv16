language: en-US
tone_instructions: "Focus on JavaScript logic bugs, financial calculation accuracy, XSS vulnerabilities, and HTML/CSS best practices."

reviews:
  profile: assertive
  path_filters:
    - "*.html"
    - "*.js"
    - "*.css"
  auto_review:
    enabled: true
    auto_incremental_review: true

tools:
  htmlhint:
    enabled: true
  eslint:
    enabled: true
  oxc:
    enabled: true
